name: Strava Import Cron

# Déclenche /api/cron/strava-import toutes les 5 minutes.
# Vercel Hobby ne permet pas les crons à intervalle court (limité à once-per-day),
# donc on utilise GitHub Actions à la place.
# Aussi déclenchable manuellement depuis l'onglet Actions du repo.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel cron endpoint
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://trail-cockpit.vercel.app/api/cron/strava-import)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "Response: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron endpoint returned non-200 status"
            exit 1
          fi
