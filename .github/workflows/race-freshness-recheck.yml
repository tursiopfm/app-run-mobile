name: Race Freshness Re-check

# Déclenche /api/cron/race-freshness une fois par jour (04:17 UTC).
# Re-fetch les tableaux des courses planifiées et enregistre un pending_diff sur
# race_tableau_meta si le parcours/les barrières ont changé ou si une nouvelle
# édition est sortie (jamais d'écrasement : validation utilisateur au Lot 2b).
# Aussi déclenchable manuellement depuis l'onglet Actions du repo.

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel cron endpoint
        run: |
          response=$(curl -sS -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://trailcockpit.run/api/cron/race-freshness)
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "Response: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Cron endpoint returned non-200 status"
            exit 1
          fi
